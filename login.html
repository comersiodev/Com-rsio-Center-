<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Comérsio Login
</title>

<link rel="stylesheet"
href="style.css">

</head>

<body class="loginBody">

<form class="loginContainer"
onsubmit="loginComersio(); return false;">

    <img src="icon.png"
    class="loginLogo">

    <h1 class="loginTitle">

        COMÉRSIO CENTER

    </h1>

    <input type="text"
    id="nama"
    placeholder="Nama"
    required>

    <input type="email"
    id="email"
    placeholder="Alamat Email"
    required>

    <input type="password"
    id="password"
    placeholder="Password"
    required>

    <button type="submit">

        MASUK

    </button>

</form>

<div id="bubbleAlert"
class="bubbleAlert">

</div>

<script src="script.js">

</script>

</body>

</html>
