<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Payment Comérsio
</title>

<link rel="stylesheet"
href="style.css">

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js">
</script>

<style>

/* =========================
   BODY
========================= */

body{

    padding-top:80px;

}

/* =========================
   PAYMENT INFO
========================= */

.paymentInfo{

    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    margin-top:18px;
    margin-bottom:18px;
    font-size:13px;
    color:white;
    gap:20px;

}

.paymentInfoRight{

    text-align:right;

}

.paymentInfo p{

    margin:0;
    line-height:22px;

}

/* =========================
   SIMPLE LIST
========================= */

.simpleItem{

    background:#1a1a1a;

    border:2px solid #ffe600;

    border-radius:18px;

    padding:14px;

    margin-top:14px;

}

.simpleRow{

    display:flex;

    justify-content:space-between;

    align-items:center;

    gap:16px;

    margin-bottom:10px;

    color:white;

    font-size:14px;

}

.simpleRow:last-child{

    margin-bottom:0;

}

/* =========================
   PAYMENT BOX
========================= */

.paymentList{

    margin-top:20px;

    background:#1a1a1a;

    border:2px solid #ffe600;

    border-radius:20px;

    padding:18px;

}

.paymentHeader{

    display:flex;

    justify-content:space-between;

    align-items:center;

    gap:12px;

    margin-bottom:14px;

}

.paymentHeaderLeft{

    color:white;

    font-size:15px;

    font-weight:bold;

}

.paymentHeaderRight{

    display:flex;

    align-items:center;

    gap:10px;

}

.paymentHeaderRight img{

    width:80px;

    object-fit:contain;

}

.paymentHeaderRight span{

    color:#ffe600;

    font-size:15px;

    font-weight:bold;

}

.paymentInfoText{

    color:#bdbdbd;

    font-size:13px;

    margin-bottom:16px;

}

.paymentCard{

    background:#2a2a2a;

    padding:14px;

    border-radius:18px;

    line-height:24px;

    font-size:14px;

    border:2px solid #ffe600;

    text-align:center;

    color:white;

}

.qrisImage{

    width:180px;

    border-radius:18px;

    border:2px solid #ffe600;

}

/* =========================
   SAVE BUTTON
========================= */

.saveButton{

    width:100%;

    height:55px;

    border:none;

    border-radius:18px;

    margin-top:24px;

    margin-bottom:40px;

    background:#ffe600;

    color:black;

    font-size:15px;

    font-weight:bold;

    cursor:pointer;

}

/* =========================
   NO CAPTURE
========================= */

.noCapture{

    z-index:9999;

}

</style>

</head>

<body>

<!-- NAVBAR -->

<div id="navbar"
class="navbar">

    <div class="closeNavbar"
    onclick="toggleNavbar()">

        ✕

    </div>

    <div class="navbarHeader">

        <img src="icon.png"
        class="navLogo">

        <div class="navText">

            <p id="navUsername">

            </p>

            <p id="navEmail">

            </p>

            <p id="navTitle">

            </p>

        </div>

    </div>

    <div class="navbarMenu">

        <a href="index.html"
        class="navMenuBox">

            <img src="icon.png">

            <span>
                Menu
            </span>

        </a>

        <a href="customer.html"
        class="navMenuBox">

            <img src="nama.png">

            <span>
                Nama & ID Customer
            </span>

        </a>

        <a href="produk.html"
        class="navMenuBox">

            <img src="voucher.png">

            <span>
                Produk
            </span>

        </a>

        <a href="debt.html"
        class="navMenuBox">

            <img src="debt.png">

            <span>
                Rekap Utang
            </span>

        </a>

        <a href="monthly.html"
        class="navMenuBox">

            <img src="pembukuan.png">

            <span>
                Monthly Report
            </span>

        </a>

        <a href="recap.html"
        class="navMenuBox">

            <img src="rekap.png">

            <span>
                Rekap Utang Total
            </span>

        </a>

    </div>

</div>

<!-- OVERLAY -->

<div id="overlay"
class="overlay"
onclick="toggleNavbar()">

</div>

<!-- NAV -->

<div class="navTrigger noCapture"
onclick="toggleNavbar()">

    <img src="icon.png">

</div>

<!-- CAPTURE -->

<div id="captureArea">

<!-- HEADER -->

<div class="headerBox">

    <div class="headerLeft">

        <img src="icon.png"
        class="mainLogo">

    </div>

    <div class="headerRight">

        <h1>
            COMÉRSIO CENTER
        </h1>

    </div>

</div>

<!-- CONTENT -->

<div class="customerListBox">

    <h2>

        DETAIL PEMBAYARAN

    </h2>

    <!-- INFO -->

    <div class="paymentInfo">

        <div>

            <p id="paymentCustomerId">

            </p>

        </div>

        <div class="paymentInfoRight">

            <p id="livePaymentTime">

            </p>

        </div>

    </div>

    <!-- SIMPLE LIST -->

    <div id="paymentListSimple">

    </div>

    <!-- TOTAL -->

    <div class="totalDebtBox">

        TOTAL :
        Rp <span id="paymentTotal">

        </span>

    </div>

    <!-- PAYMENT -->

    <div id="paymentContent">

    </div>

</div>

</div>

<!-- BUTTON -->

<button class="saveButton noCapture"
onclick="saveAsImage()">

    SIMPAN BILL

</button>

<script>

/* =========================
   LOAD USER
========================= */

document
.getElementById("navUsername")
.innerText =

localStorage.getItem(
    "username"
) || "Unknown User";

document
.getElementById("navEmail")
.innerText =

localStorage.getItem(
    "email"
) || "No Email";

document
.getElementById("navTitle")
.innerText =

localStorage.getItem(
    "title"
) || "No Title";

/* =========================
   NAVBAR
========================= */

function toggleNavbar(){

    document
    .getElementById("navbar")
    .classList.toggle("active");

    document
    .getElementById("overlay")
    .classList.toggle("active");

}

/* =========================
   STORAGE
========================= */

const customer =
localStorage.getItem(
    "paymentCustomer"
);

const total =
localStorage.getItem(
    "paymentTotal"
);

const method =
localStorage.getItem(
    "paymentMethod"
);

const debts =
JSON.parse(
localStorage.getItem("debts")
) || {};

/* =========================
   CUSTOMER
========================= */

document
.getElementById("paymentCustomerId")
.innerText =

`ID : ${customer}`;

/* =========================
   TIME
========================= */

function updateLivePaymentTime(){

    const now =
    new Date();

    const day =
    String(now.getDate())
    .padStart(2,"0");

    const month =
    String(now.getMonth()+1)
    .padStart(2,"0");

    const year =
    now.getFullYear();

    const hours =
    String(now.getHours())
    .padStart(2,"0");

    const minutes =
    String(now.getMinutes())
    .padStart(2,"0");

    const seconds =
    String(now.getSeconds())
    .padStart(2,"0");

    document
    .getElementById("livePaymentTime")
    .innerText =

    `${day}/${month}/${year}
    •
    ${hours}:${minutes}:${seconds}`;

}

updateLivePaymentTime();

setInterval(
updateLivePaymentTime,
1000
);

/* =========================
   TOTAL
========================= */

document
.getElementById("paymentTotal")
.innerText =

parseInt(total || 0)
.toLocaleString("id-ID");

/* =========================
   SIMPLE LIST
========================= */

const list =
document.getElementById(
    "paymentListSimple"
);

const customerDebt =
debts[customer] || [];

customerDebt.forEach(item => {

    list.innerHTML += `

    <div class="simpleItem">

        <div class="simpleRow">

            <span>
                Produk
            </span>

            <span>
                ${item.produk}
            </span>

        </div>

        <div class="simpleRow">

            <span>
                Harga
            </span>

            <span>
                Rp ${item.harga
                .toLocaleString("id-ID")}
            </span>

        </div>

        <div class="simpleRow">

            <span>
                Diskon
            </span>

            <span>

                Rp ${(item.diskon || 0)
                .toLocaleString("id-ID")}

            </span>

        </div>

    </div>

    `;

});

/* =========================
   PAYMENT DATA
========================= */

const paymentData = {

    qris:{

        logo:"QRIS Logo.png",
        name:"QRIS",
        type:"qris",
        number:"",
        owner:""

    },

    gopay:{

        logo:"GoPay.png",
        name:"GoPay",
        type:"ewallet",
        number:"083874854586",
        owner:"An E•• P••••••"

    },

    dana:{

        logo:"DANA.png",
        name:"DANA",
        type:"ewallet",
        number:"081226672073",
        owner:"An E•• P••••••"

    },

    shopeepay:{

        logo:"ShopeePay.png",
        name:"ShopeePay",
        type:"ewallet",
        number:"083874854586",
        owner:"An E•• P••••••"

    },

    seabank:{

        logo:"SeaBank.png",
        name:"SeaBank",
        type:"bank",
        number:"901677273030",
        owner:"An E•• P••••••"

    },

    bri:{

        logo:"Bank BRI.png",
        name:"BRI",
        type:"bank",
        number:"696101033719531",
        owner:"An E•• P••••••"

    },

    bankjago:{

        logo:"Bank Jago.png",
        name:"Bank Jago",
        type:"bank",
        number:"100626307457",
        owner:"An E•• P••••••"

    },

    krom:{

        logo:"Krom.png",
        name:"Krom",
        type:"bank",
        number:"770015012050",
        owner:"An E•• P••••••"

    }

};

const pay =
paymentData[method];

/* =========================
   PAYMENT TEXT
========================= */

let infoText = "";

if(pay.type === "qris"){

    infoText =
    "Scan QR Code dibawah";

}

else if(pay.type === "ewallet"){

    infoText =
    "Salin nomor dibawah";

}

else{

    infoText =
    "Salin nomor rekening dibawah";

}

/* =========================
   PAYMENT CONTENT
========================= */

const content =
document.getElementById(
    "paymentContent"
);

content.innerHTML = `

<div class="paymentList">

    <div class="paymentHeader">

        <div class="paymentHeaderLeft">

            Payment Method :

        </div>

        <div class="paymentHeaderRight">

            <img src="${pay.logo}">

            <span>

                ${pay.name}

            </span>

        </div>

    </div>

    <div class="paymentInfoText">

        ${infoText}

    </div>

    ${pay.type === "qris"

    ?

    `

    <div class="paymentCard">

        <img src="QRIS.png"
        class="qrisImage">

    </div>

    `

    :

    `

    <div class="paymentCard">

        ${pay.number}

        <br>

        ${pay.owner}

    </div>

    `}

</div>

`;

/* =========================
   SAVE IMAGE
========================= */

function saveAsImage(){

    const hiddenItems =
    document.querySelectorAll(
    ".noCapture"
    );

    hiddenItems.forEach(item => {

        item.style.display =
        "none";

    });

    html2canvas(

        document.getElementById(
        "captureArea"
        ),

        {

            scale:3

        }

    ).then(canvas => {

        const link =
        document.createElement("a");

        link.download =
        "Bill-Comersio.png";

        link.href =
        canvas.toDataURL();

        link.click();

        hiddenItems.forEach(item => {

            item.style.display =
            "block";

        });

    });

}

</script>

</body>

</html>
